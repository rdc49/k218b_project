# Batch 16 of 16 -- K218b main parameter sweep
# Full sweep definition: ../full_parameter_sweep.toml
# This batch: fO2_shift_IW = 0 ; H_budget = high half [29240.177382128637, 49999.99999999999] ; C_budget = high half [0.32, 3.2]
# Grid size: 1 (fO2) x 2 (H_budget) x 2 (C_budget) x 4 (N_budget) x 4 (S_budget) = 64 points
#
# Batch size chosen so every "typical" cluster machine (24 or 48 cores --
# 13 of the 14 IoA machines) is fully used for the batch's whole duration
# (64 > 48), while giving 16 batches total so up to all 14 machines can run
# one concurrently (2 spare). The one exception is cap005a (112 cores): a
# single 64-point batch only fills 64 of its cores, leaving 48 idle for
# that batch's duration -- a deliberate, accepted trade-off, since that
# loss is far smaller than leaving whole machines idle (the previous
# 8-batches-of-128 design could only ever use 8 of the 14 machines at
# once). If cap005a's spare capacity matters for a given run, launch a
# second batch there concurrently in a separate tmux session rather than
# leaving it under-filled. See grid_sweep_cluster_howto.md for the
# per-machine core counts and CLAUDE.md for the full reasoning.
#
# `symlink` points PROTEUS at raw_grid_output/ in this project so the
# real data is written directly here (NFS-shared across the cluster),
# rather than under PROTEUS/output/, which becomes just a symlink to it.
# Move a completed run into simulation_data/ with scripts/move_sweep.py
# once checked over -- see CLAUDE.md.

output = "k218b_project_main_parameter_sweep_batch16/"
symlink = "/data/rdc49-2/K218b_project/raw_grid_output/k218b_project_main_parameter_sweep_batch16"

ref_config = "input/nogit_k218b_project/k218b_fiducial.toml"

use_slurm = false
max_jobs = 500
max_days = 1
max_mem  = 3

["planet.elements.H_budget"]
    method = "direct"
    values = [29240.177382128637,49999.99999999999]

["planet.elements.C_budget"]
    method = "direct"
    values = [0.32,3.2]

["planet.elements.N_budget"]
    method = "direct"
    values = [0.0009,0.009,0.09,0.9]

["planet.elements.S_budget"]
    method = "direct"
    values = [0.004,0.04,0.4,4.0]

["outgas.fO2_shift_IW"]
    method = "direct"
    values = [0.0]
