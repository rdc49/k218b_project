# Batch 4 of 8 -- K218b main parameter sweep
# Full sweep definition: ../full_parameter_sweep.toml
# This batch: fO2_shift_IW = -2 ; H_budget = high half [2.92e4, 5.00e4]
# Grid size: 1 (fO2) x 2 (H_budget) x 4 (C_budget) x 4 (N_budget) x 4 (S_budget) = 128 points
# Batch size chosen to exceed the largest machine's core count (cap005a,
# 112 cores) on the IoA cluster, so a batch never idles cores no matter
# which machine runs it -- see nogit_grid_sweep_cluster_howto.md /
# grid_sweep_cluster_howto.md for the per-machine core counts.
#
# `symlink` points PROTEUS at raw_grid_output/ in this project so the
# real data is written directly here (NFS-shared across the cluster),
# rather than under PROTEUS/output/, which becomes just a symlink to it.
# Move a completed run into simulation_data/ with scripts/move_sweep.py
# once checked over -- see CLAUDE.md.

output = "k218b_project_main_parameter_sweep_batch04/"
symlink = "/data/rdc49-2/K218b_project/raw_grid_output/k218b_project_main_parameter_sweep_batch04"

ref_config = "input/nogit_k218b_project/k218b_fiducial.toml"

use_slurm = false
max_jobs = 500
max_days = 1
max_mem  = 3

["planet.elements.H_budget"]
    method = "direct"
    values = [29240.177382128637,49999.99999999999]

["planet.elements.C_budget"]
    method = "direct"
    values = [3.2e-3,3.2e-2,3.2e-1,3.2e0]

["planet.elements.N_budget"]
    method = "direct"
    values = [9e-4,9e-3,9e-2,9e-1]

["planet.elements.S_budget"]
    method = "direct"
    values = [4e-3,4e-2,4e-1,4e0]

["outgas.fO2_shift_IW"]
    method = "direct"
    values = [-2]
