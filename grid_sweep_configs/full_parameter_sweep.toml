# Config file for the main parameter sweep of the K218b project.
#
# Full factorial grid: 4 (H_budget) x 4 (C_budget) x 4 (N_budget) x
# 4 (S_budget) x 4 (fO2_shift_IW) = 1024 points. This is NOT meant to be
# submitted as a single `proteus grid` run across the whole cluster at once.
# It is split into 16 batches of 64 points each in batch_configs/
# (batch01.toml .. batch16.toml), split by fO2_shift_IW (4 values) x
# H_budget low/high half (2 groups) x C_budget low/high half (2 groups),
# each batch keeping the full N/S axes.
#
# Batch size balances two competing goals given the IoA cluster's real
# spec (14 machines: 24-112 cores each, 13 of them at 24 or 48, the
# outlier cap005a at 112 -- see grid_sweep_cluster_howto.md), since
# `proteus grid` self-clamps its thread pool to min(max_jobs, batch_size,
# os.cpu_count()):
#   1. No single batch should idle cores on whichever machine runs it.
#   2. There should be enough independent batches to occupy most/all 14
#      machines at once, not just a handful.
# These pull in opposite directions: sizing every batch above cap005a's
# 112 cores (as an earlier version of this file did, at 128 points) only
# allows 8 batches total from the fixed 1024-point grid, capping
# simultaneous cluster usage at 8 of 14 machines regardless of how many
# are actually free. 64 points is instead sized above the *typical*
# machine (48 cores, covering 13 of the 14 machines, including cap001a's
# 24), giving 16 batches -- enough to occupy all 14 machines with 2 spare.
# The accepted trade-off: a single 64-point batch landing on cap005a only
# fills 64 of its 112 cores, leaving 48 idle for that batch's duration.
# That loss is far smaller than leaving whole machines idle, so it's the
# preferred trade-off here; run a second batch concurrently on cap005a in
# a separate tmux session if using its spare capacity matters for a given
# push. This file is kept as the reference definition of the full sweep;
# submit the batch files instead.

output = "k218b_project_main_parameter_sweep/"
symlink = ""

ref_config = "input/nogit_k218b_project/k218b_fiducial.toml"

use_slurm = false
max_jobs = 500
max_days = 1
max_mem  = 3

["planet.elements.H_budget"]
    method = "logspace"
    start  = 1e4
    stop   = 5e4
    count  = 4

["planet.elements.C_budget"]
    method = "direct"
    values = [3.2e-3,3.2e-2,3.2e-1,3.2e0]

["planet.elements.N_budget"]
    method = "direct"
    values = [9e-4,9e-3,9e-2,9e-1]

["planet.elements.S_budget"]
    method = "direct"
    values = [4e-3,4e-2,4e-1,4e0]
    
["outgas.fO2_shift_IW"]
    method = "direct"
    values = [-3,-2,-1,0]
